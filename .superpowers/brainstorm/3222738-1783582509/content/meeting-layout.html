<h2>会议中主界面布局</h2>
<p class="subtitle">选择一个你偏好的会议房间整体布局，后续组件会按容器查询适配</p>

<div class="options">
  <div class="option" data-choice="classic" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>经典布局</h3>
      <div class="mockup" style="margin-top:0.75rem">
        <div class="mockup-header">顶部信息栏</div>
        <div class="mockup-body" style="min-height:80px;display:flex;align-items:center;justify-content:center;background:#e5e7eb">视频网格区</div>
        <div style="padding:0.5rem;text-align:center;background:#f3f4f6">底部工具栏</div>
      </div>
      <p>视频网格占主体，工具栏固定在底部，侧边栏可滑出。</p>
    </div>
  </div>

  <div class="option" data-choice="sidebar-right" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>右侧边栏固定布局</h3>
      <div class="mockup" style="margin-top:0.75rem">
        <div class="mockup-body" style="min-height:80px;display:flex">
          <div style="flex:1;background:#e5e7eb;display:flex;align-items:center;justify-content:center">视频区</div>
          <div style="width:80px;background:#d1d5db;display:flex;align-items:center;justify-content:center;font-size:0.75rem">参会者/聊天</div>
        </div>
      </div>
      <p>视频区与侧边栏并排，适合常驻聊天或参会者列表。</p>
    </div>
  </div>

  <div class="option" data-choice="immersive" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>沉浸演讲者布局</h3>
      <div class="mockup" style="margin-top:0.75rem">
        <div class="mockup-body" style="min-height:80px;display:flex;align-items:center;justify-content:center;background:#111827;color:#fff">主视频 / 屏幕共享</div>
        <div style="position:absolute;right:8px;top:8px;width:60px;height:40px;background:#374151;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.7rem">小窗口</div>
      </div>
      <p>全屏主讲人/屏幕共享，自己的摄像头以小窗口悬浮，工具栏自动隐藏。</p>
    </div>
  </div>
</div>
